<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Edit — Connect Your Taste</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #F0EAE0;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    color: #2C1F14;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 5rem;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    margin-bottom: 4px;
  }

  .subtitle {
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: #A89880;
    margin-bottom: 2.5rem;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1rem;
    width: 100%;
    max-width: 900px;
  }

  .card {
    background: #EDE4D3;
    border: 0.5px solid #C4B49E;
    border-radius: 8px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
  }

  .card-desc {
    font-size: 12px;
    color: #6B5D4A;
    line-height: 1.4;
    flex: 1;
  }

  .card-status {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #A89880;
  }

  .card-status.connected {
    color: #4A7A5E;
  }

  button {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    background: #2C1F14;
    color: #F0EAE0;
    border: none;
    border-radius: 6px;
    padding: 0.6rem 1rem;
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.5;
    cursor: default;
  }

  button.secondary {
    background: transparent;
    border: 0.5px solid #C4B49E;
    color: #2C1F14;
  }

  .generate-row {
    margin-top: 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .generate-row button {
    font-size: 14px;
    padding: 0.9rem 2rem;
  }

  .status-line {
    font-size: 12px;
    color: #6B5D4A;
    min-height: 16px;
  }
</style>
</head>
<body>
  <div class="title">The Edit</div>
  <div class="subtitle">connect the sources that already know your taste</div>

  <div class="cards" id="cards"></div>

  <div class="generate-row">
    <button id="generate-btn">Generate my graph</button>
    <div class="status-line" id="generate-status"></div>
  </div>

<script>
const SOURCES = [
  { id: "apple_photos", label: "Apple Photos", desc: "Your favorited photos, read directly from Photos.app on this Mac. No account, no upload.", oauth: false, action: "Import from Photos.app" },
  { id: "pinterest", label: "Pinterest", desc: "Pull images straight from your boards.", oauth: true, action: "Fetch pins" },
  { id: "google_photos", label: "Google Photos", desc: "Pick specific photos from your library in Google's picker.", oauth: true, action: "Pick photos" },
  { id: "spotify", label: "Spotify", desc: "Your top artists and genres, folded into your taste profile's music mood.", oauth: true, action: "Fetch listening data" },
];

const cardsEl = document.getElementById("cards");

function renderCards(status) {
  cardsEl.innerHTML = "";
  for (const source of SOURCES) {
    const connected = status[source.id]?.connected;
    const card = document.createElement("div");
    card.className = "card";

    const connectBtn = source.oauth && !connected
      ? `<button onclick="location.href='/auth/${source.id}/start'">Connect</button>`
      : "";
    const fetchBtn = (!source.oauth || connected)
      ? `<button class="${source.oauth ? 'secondary' : ''}" onclick="fetchSource('${source.id}', this)">${source.action}</button>`
      : "";

    card.innerHTML = `
      <div class="card-name">${source.label}</div>
      <div class="card-desc">${source.desc}</div>
      <div class="card-status ${connected ? 'connected' : ''}">${source.oauth ? (connected ? 'connected' : 'not connected') : (connected ? 'available' : 'unavailable')}</div>
      ${connectBtn}${fetchBtn}
    `;
    cardsEl.appendChild(card);
  }
}

async function loadStatus() {
  const res = await fetch("/api/sources/status");
  const status = await res.json();
  renderCards(status);
}

async function fetchSource(id, btn) {
  btn.disabled = true;
  const original = btn.textContent;
  btn.textContent = "Working…";
  try {
    const res = await fetch(`/api/sources/${id}/fetch`, { method: "POST" });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "fetch failed");
    btn.textContent = "Done";
  } catch (e) {
    btn.textContent = original;
    alert(`${id} fetch failed: ${e.message}`);
  } finally {
    btn.disabled = false;
  }
}

document.getElementById("generate-btn").addEventListener("click", async (e) => {
  const btn = e.target;
  const statusLine = document.getElementById("generate-status");
  btn.disabled = true;
  statusLine.textContent = "Running the pipeline, this can take a few minutes…";
  try {
    const res = await fetch("/api/generate", { method: "POST" });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "generate failed");
    statusLine.textContent = "Done, opening your graph…";
    window.location.href = "/";
  } catch (err) {
    statusLine.textContent = `Failed: ${err.message}`;
    btn.disabled = false;
  }
});

loadStatus();
</script>
</body>
</html>
